<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0b0a" />
  <title>Restaurante da Célia - Sabor Único</title>
  
  <!-- Google Fonts de Altíssimo Padrão -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    /* Reset & Estrutura */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --gold: #dfb26c;
      --gold-gradient: linear-gradient(135deg, #f3d098 0%, #b8873c 50%, #8c601c 100%);
      --dark-bg: #0d0908;
      --red-accent: #b31217;
      --whatsapp-green: #25D366;
    }

    body {
      background-color: var(--dark-bg);
      color: #f7f4f2;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 2.5rem 1.5rem;
      overflow: hidden;
      position: relative;
    }

    /* Fundo Atmosférico Cinematográfico */
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 50% 35%, rgba(179, 18, 23, 0.15) 0%, transparent 60%),
        radial-gradient(circle at 50% 85%, rgba(223, 178, 108, 0.1) 0%, transparent 50%);
      z-index: 1;
      pointer-events: none;
    }

    /* Brasa/Fagulhas subindo (Simula calor e aconchego de comida caseira) */
    .ember {
      position: absolute;
      background: radial-gradient(circle, rgba(243, 208, 152, 0.8) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
      animation: rise 8s infinite linear;
      opacity: 0;
    }

    @keyframes rise {
      0% {
        transform: translateY(110vh) translateX(0) scale(0.5);
        opacity: 0;
      }
      10% { opacity: 0.8; }
      90% { opacity: 0.4; }
      100% {
        transform: translateY(-10vh) translateX(50px) scale(1.2);
        opacity: 0;
      }
    }

    /* Container Principal */
    .experience-wrap {
      width: 100%;
      max-width: 400px;
      text-align: center;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Elemento Visual Central */
    .plate-concept {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plate-ring {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(223, 178, 108, 0.2);
      border-radius: 50%;
      animation: spin 20s linear infinite;
    }

    .plate-ring::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      width: 6px;
      height: 6px;
      background: var(--gold-gradient);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--gold);
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .plate-glow {
      position: absolute;
      width: 110px;
      height: 110px;
      background: radial-gradient(circle, rgba(223, 178, 108, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulseGlow 3s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      0% { transform: scale(0.9); opacity: 0.6; }
      100% { transform: scale(1.15); opacity: 1; }
    }

    /* Ícone Centralizado do Prato */
    .plate-icon {
      z-index: 3;
      width: 64px;
      height: 64px;
      fill: none;
      stroke: url(#gold-grad-svg);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 4px 10px rgba(223, 178, 108, 0.35));
    }

    /* Tipografia de Apresentação */
    .welcome-badge {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      display: block;
      opacity: 0.9;
    }

    .restaurant-title {
      font-family: 'Cinzel', serif;
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .sensory-message {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #d1c7c2;
      font-weight: 300;
      max-width: 320px;
      margin-bottom: 3.5rem;
    }

    .sensory-message strong {
      color: #fff;
      font-weight: 600;
    }

    /* O Botão de Entrada Monumental */
    .button-reveal-box {
      position: relative;
      width: 100%;
      max-width: 320px;
    }

    .button-glow-border {
      position: absolute;
      inset: -2px;
      border-radius: 50px;
      background: var(--gold-gradient);
      opacity: 0.3;
      filter: blur(8px);
      transition: all 0.5s ease;
      z-index: 1;
      pointer-events: none; /* Isso garante que o brilho não bloqueie o clique */
    }

    .experience-btn {
      position: relative;
      z-index: 2; /* Mantém o botão na frente para ser clicável */
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      width: 100%;
      padding: 1.3rem 2rem;
      background: linear-gradient(135deg, #181311 0%, #0d0908 100%);
      border: 1px solid rgba(223, 178, 108, 0.4);
      border-radius: 50px;
      color: #ffffff;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-decoration: none;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Brilho interno do botão */
    .experience-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.08),
        transparent
      );
      transition: 0.5s;
    }

    /* Estado de Ativação / Clique */
    .experience-btn:active {
      transform: scale(0.96);
      border-color: var(--gold);
    }

    /* Micro-Footer */
    .footer-stamp {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(223, 178, 108, 0.4);
      z-index: 10;
      font-weight: 600;
    }

    /* Efeito de Transição Explosivo (Tela Flash ao clicar) */
    .transition-flash {
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease-out;
    }

    .transition-flash.active {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Gradientes de Luz de Fundo -->
  <div class="bg-overlay"></div>

  <!-- Elemento SVG para o gradiente metálico -->
  <svg style="width:0; height:0; position:absolute;" aria-hidden="true">
    <linearGradient id="gold-grad-svg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3d098" />
      <stop offset="50%" stop-color="#b8873c" />
      <stop offset="100%" stop-color="#8c601c" />
    </linearGradient>
  </svg>

  <!-- Flash de transição para o clique -->
  <div class="transition-flash" id="flash-screen"></div>

  <!-- Bloco de Experiência Central -->
  <main class="experience-wrap">
    
    <div class="plate-concept">
      <div class="plate-ring"></div>
      <div class="plate-glow"></div>
      <svg class="plate-icon" viewBox="0 0 24 24">
        <path d="M2 17h20v2H2v-2zm10-14a1 1 0 0 1 1 1v1.07A8.001 8.001 0 0 1 20 13H4a8.001 8.001 0 0 1 7-7.93V4a1 1 0 0 1 1-1z" />
      </svg>
    </div>

    <!-- Títulos e Apelo Sensorial -->
    <span class="welcome-badge">Seja Bem-Vindo</span>
    <h1 class="restaurant-title">Restaurante da Célia</h1>
    
    <p class="sensory-message">
      O aroma do tempero caseiro já está pronto. <strong>Toque abaixo</strong> para abrir o cardápio e fazer o seu pedido diretamente no WhatsApp.
    </p>

    <!-- Botão de Ação Único -->
    <div class="button-reveal-box">
      <a href="#" id="cta-button" class="experience-btn">
        <span>ENTRAR & PEDIR</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
      <div class="button-glow-border"></div>
    </div>

  </main>

  <footer class="footer-stamp">
    Sabor & Tradição • Contagem
  </footer>

  <script>
    // WhatsApp Real Configurado com Sucesso
    const DDD_TELEFONE = "31992034948"; 

    const MENSAGEM_ACOLHIDA = 
      "Olá! 🍲\n\n" +
      "Acabei de escanear o QR Code de vocês! Gostaria de ver o cardápio do dia e fazer o meu pedido. ✨";

    const encodedMessage = encodeURIComponent(MENSAGEM_ACOLHIDA);
    const whatsappUrl = `https://wa.me/${DDD_TELEFONE}?text=${encodedMessage}`;

    // Partículas de brasa flutuando
    const body = document.body;
    for (let i = 0; i < 15; i++) {
      const ember = document.createElement('div');
      ember.className = 'ember';
      ember.style.left = `${Math.random() * 100}vw`;
      ember.style.width = `${Math.random() * 5 + 3}px`;
      ember.style.height = ember.style.width;
      ember.style.animationDelay = `${Math.random() * 8}s`;
      ember.style.animationDuration = `${Math.random() * 5 + 6}s`;
      body.appendChild(ember);
    }

    // Transição Cinemática e Redirecionamento (com fallback de segurança)
    const ctaButton = document.getElementById('cta-button');
    const flashScreen = document.getElementById('flash-screen');

    // Insere o link no botão logo de cara como dupla garantia
    ctaButton.href = whatsappUrl;

    ctaButton.addEventListener('click', (e) => {
      e.preventDefault(); // Pausa o redirecionamento padrão
      flashScreen.classList.add('active'); // Acende o flash cinematográfico
      
      // Espera 250 milissegundos do flash antes de abrir o WhatsApp
      setTimeout(() => {
        window.location.href = whatsappUrl;
      }, 250);

      // Desliga o flash caso a pessoa volte para a aba
      setTimeout(() => {
        flashScreen.classList.remove('active');
      }, 1000);
    });
  </script>
</body>
</html>
