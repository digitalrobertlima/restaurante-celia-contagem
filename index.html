<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#e51d1d" />
  <title>Restaurante Célia Contagem</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="favicon.ico" />
  <meta name="description" content="Aqui será onde você pedirá sua marmita todo dia sem dores de cabeça." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Marmitas Célia" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #f4f4f4;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 1rem 5rem; /* espaço pro banner */
    }
    #explosion { font-size: 2.5rem; color: #e51d1d; animation: fadeOut 2s forwards; }
    #message { font-size: 1.4rem; color: #333; display: none; text-align: center; }
    @keyframes fadeOut { to { opacity: 0; } }
    /* Banner instalação */
    #install-banner {
      position: fixed;
      inset: auto 0 0 0;
      background: linear-gradient(135deg,#e51d1d,#ff6a00);
      color: #fff;
      padding: 1rem .85rem 1.1rem;
      display: flex;
      gap: .9rem;
      align-items: flex-start;
      box-shadow: 0 -4px 18px -4px rgba(0,0,0,.35);
      font-size: .95rem;
      line-height: 1.3;
      z-index: 1000;
      animation: slideUp .4s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0;} }
    #install-banner.hidden { display: none; }
    #install-banner .text { flex: 1; font-weight: 500; }
    #install-banner strong { display: block; font-size: .8rem; letter-spacing: .5px; opacity: .85; font-weight: 600; margin-bottom: .25rem; text-transform: uppercase; }
    #install-banner button {
      appearance: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      padding: .65rem 1rem;
      font-size: .85rem;
      font-family: inherit;
      transition: background .25s, transform .15s;
    }
    #btn-install { background:#fff; color:#d31616; }
    #btn-install:hover { background:#ffe5e5; }
    #btn-later { background:rgba(255,255,255,.18); color:#fff; backdrop-filter: blur(4px); }
    #btn-later:hover { background:rgba(255,255,255,.28); }
    #install-actions { display:flex; flex-direction:column; gap:.5rem; }
    @media (min-width:560px){
      #install-banner { align-items:center; }
      #install-actions { flex-direction:row; }
    }
  </style>
</head>
<body>
  <div id="explosion" aria-hidden="true">💥</div>
  <div id="message" role="status">em breve aqui, uma inovação</div>

  <!-- Banner de instalação PWA -->
  <div id="install-banner" class="hidden" role="dialog" aria-live="polite" aria-label="Instalar Aplicativo">
    <div class="text">
      <strong>Pré-Lançamento</strong>
      aqui será onde você pedirá sua marmita todo dia sem dores de cabeça, mas ainda nosso app ta sendo criado, aproveite e já deiexe-o instalado para receber todas atualizações.
    </div>
    <div id="install-actions">
      <button id="btn-install" type="button">Instalar</button>
      <button id="btn-later" type="button">Agora não</button>
    </div>
  </div>

  <script>
    // Animação inicial
    setTimeout(() => {
      const explosion = document.getElementById('explosion');
      if (explosion) explosion.style.display = 'none';
      const message = document.getElementById('message');
      if (message) message.style.display = 'block';
    }, 2000);

    // ================= PWA Setup =================
    const BANNER_ID = 'install-banner';
    let deferredPrompt = null;

    function isInStandaloneMode(){
      return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
    }

    function showBanner(){
      if(isInStandaloneMode()) return; // já instalado
      const banner = document.getElementById(BANNER_ID);
      if (banner) banner.classList.remove('hidden');
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      showBanner();
    });

    // Força exibir banner mesmo que o evento ainda não tenha disparado (Safari iOS não suporta) 
    window.addEventListener('DOMContentLoaded', () => {
      // Exibe sempre a cada visita (requisito); ajuste se quiser limitar.
      setTimeout(() => showBanner(), 1200);
    });

    document.getElementById('btn-install').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const choice = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (choice.outcome === 'accepted') {
          hideBanner();
        } else {
          // usuário cancelou, mantém política de mostrar novamente em próxima visita
          hideBanner();
        }
      } else {
        // fallback para instruções manuais (iOS por ex.)
        alert('Para instalar: use "Adicionar à Tela Inicial" no menu do seu navegador.');
      }
    });

    function hideBanner(){
      const banner = document.getElementById(BANNER_ID);
      if (banner) banner.classList.add('hidden');
    }
    document.getElementById('btn-later').addEventListener('click', hideBanner);

    // Registro do Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW falhou:', err));
      });
    }
  </script>
</body>
</html>
