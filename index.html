<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#e51d1d" />
  <title>Restaurante Célia Contagem</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="favicon.ico" />
  <meta name="description" content="Aqui será onde você pedirá sua marmita todo dia sem dores de cabeça." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Marmitas Célia" />
  <meta name="app-version" content="v0.0.0-betatest" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #f4f4f4;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 1rem 5rem; /* espaço pro banner */
    }
    #explosion { font-size: 2.5rem; color: #e51d1d; animation: fadeOut 2s forwards; }
    #message { font-size: 1.4rem; color: #333; display: none; text-align: center; }
    @keyframes fadeOut { to { opacity: 0; } }
    /* Banner instalação */
    #install-banner {
      position: fixed;
      inset: auto 0 0 0;
      background: linear-gradient(135deg,#e51d1d,#ff6a00);
      color: #fff;
      padding: 1rem .85rem 1.1rem;
      display: flex;
      gap: .9rem;
      align-items: flex-start;
      box-shadow: 0 -4px 18px -4px rgba(0,0,0,.35);
      font-size: .95rem;
      line-height: 1.3;
      z-index: 1000;
      animation: slideUp .4s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0;} }
    #install-banner.hidden { display: none; }
    #install-banner .text { flex: 1; font-weight: 500; }
    #install-banner strong { display: block; font-size: .8rem; letter-spacing: .5px; opacity: .85; font-weight: 600; margin-bottom: .25rem; text-transform: uppercase; }
    #install-banner button {
      appearance: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      padding: .65rem 1rem;
      font-size: .85rem;
      font-family: inherit;
      transition: background .25s, transform .15s;
    }
    #btn-install { background:#fff; color:#d31616; }
    #btn-install:hover { background:#ffe5e5; }
    #btn-later { background:rgba(255,255,255,.18); color:#fff; backdrop-filter: blur(4px); }
    #btn-later:hover { background:rgba(255,255,255,.28); }
    #install-actions { display:flex; flex-direction:column; gap:.5rem; }
    @media (min-width:560px){
      #install-banner { align-items:center; }
      #install-actions { flex-direction:row; }
    }
    /* Versão no rodapé */
    #app-version {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      text-align: center;
      font-size: .65rem;
      letter-spacing: .5px;
      font-weight: 500;
      padding: .35rem .5rem .45rem;
      background: rgba(0,0,0,.6);
      color: #fff;
      backdrop-filter: blur(6px);
      z-index: 900; /* abaixo do banner (1000) */
      font-family: system-ui, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="explosion" aria-hidden="true">💥</div>
  <div id="message" role="status">em breve aqui, uma inovação</div>

  <!-- Banner de instalação PWA -->
  <div id="install-banner" class="hidden" role="dialog" aria-live="polite" aria-label="Instalar Aplicativo">
    <div class="text">
      <strong>Pré-Lançamento</strong>
      aqui será onde você pedirá sua marmita todo dia sem dores de cabeça, mas ainda nosso app ta sendo criado, aproveite e já deiexe-o instalado para receber todas atualizações.
    </div>
    <div id="install-actions">
      <button id="btn-install" type="button">Instalar</button>
      <button id="btn-later" type="button">Agora não</button>
    </div>
  </div>

  <footer id="app-version" aria-label="Versão do aplicativo">versão carregando…</footer>
  <div id="update-available" style="display:none;position:fixed;right:1rem;bottom:4.5rem;background:#222;color:#fff;padding:.75rem 1rem;border-radius:8px;font-size:.8rem;box-shadow:0 4px 16px -4px rgba(0,0,0,.4);z-index:1200;max-width:260px;line-height:1.3;font-family:system-ui,Arial,sans-serif;">
    Nova versão disponível. <button id="btn-update" style="margin-top:.5rem;background:#fff;color:#d31616;border:none;padding:.4rem .7rem;font-weight:600;border-radius:4px;cursor:pointer;">Atualizar</button>
  </div>

  <script>
    // Animação inicial
    setTimeout(() => {
      const explosion = document.getElementById('explosion');
      if (explosion) explosion.style.display = 'none';
      const message = document.getElementById('message');
      if (message) message.style.display = 'block';
    }, 2000);

    // ================= PWA Setup =================
    const BANNER_ID = 'install-banner';
    let deferredPrompt = null;

    function isInStandaloneMode(){
      return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
    }

    function showBanner(){
      if(isInStandaloneMode()) return; // já instalado
      const banner = document.getElementById(BANNER_ID);
      if (banner) banner.classList.remove('hidden');
  positionVersionBadge();
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      showBanner();
    });

    // Força exibir banner mesmo que o evento ainda não tenha disparado (Safari iOS não suporta) 
    window.addEventListener('DOMContentLoaded', () => {
      // Exibe sempre a cada visita (requisito); ajuste se quiser limitar.
      setTimeout(() => showBanner(), 1200);
    });

    document.getElementById('btn-install').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const choice = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (choice.outcome === 'accepted') {
          hideBanner();
        } else {
          // usuário cancelou, mantém política de mostrar novamente em próxima visita
          hideBanner();
        }
      } else {
        // fallback para instruções manuais (iOS por ex.)
        alert('Para instalar: use "Adicionar à Tela Inicial" no menu do seu navegador.');
      }
    });

    function hideBanner(){
      const banner = document.getElementById(BANNER_ID);
      if (banner) banner.classList.add('hidden');
  positionVersionBadge();
    }
    document.getElementById('btn-later').addEventListener('click', hideBanner);

    // Registro do Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW falhou:', err));
      });
    }

    // ====== Versão no rodapé ======
    const versionMeta = document.querySelector('meta[name="app-version"]');
    const versionValue = versionMeta ? versionMeta.content : 'dev';
    const versionEl = document.getElementById('app-version');
    if (versionEl) versionEl.textContent = `versão ${versionValue}`;

    function positionVersionBadge(){
      const banner = document.getElementById(BANNER_ID);
      const badge = document.getElementById('app-version');
      if(!badge) return;
      if (banner && !banner.classList.contains('hidden')) {
        const h = banner.offsetHeight || 0;
        badge.style.bottom = h + 'px';
      } else {
        badge.style.bottom = '0';
      }
    }
    window.addEventListener('resize', positionVersionBadge);
    window.addEventListener('DOMContentLoaded', () => setTimeout(positionVersionBadge, 1500));

    // ====== Detecção de nova versão ======
    async function checkRemoteVersion(){
      try {
        const res = await fetch('version.json', { cache: 'no-store' });
        if(!res.ok) return;
        const data = await res.json();
        const local = versionValue;
        if (data.version && data.version !== local) {
          showUpdatePrompt();
        }
      } catch(e){
        // silencioso
      }
    }

    function showUpdatePrompt(){
      const box = document.getElementById('update-available');
      if (box) box.style.display = 'block';
    }
    document.getElementById('btn-update').addEventListener('click', async () => {
      // força SW a atualizar e recarrega
      if (navigator.serviceWorker?.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
      }
      setTimeout(() => window.location.reload(), 400);
    });

    // Escuta mensagens do SW (ex: NEW_VERSION)
    navigator.serviceWorker?.addEventListener('message', (event) => {
      if (event.data?.type === 'NEW_VERSION' && event.data.version !== versionValue) {
        showUpdatePrompt();
      }
    });

    // Checagem periódica a cada 2 minutos
    setInterval(checkRemoteVersion, 120000);
    // Primeira checagem após carregar
    setTimeout(checkRemoteVersion, 4000);
  </script>
</body>
</html>
